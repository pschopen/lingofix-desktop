name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  macos-arm64:
    name: Build macOS ARM64
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri -> target

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version ^2 --locked

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build macOS ARM64 app bundle
        run: npm run build:app:mac:arm64

      - name: Archive app bundle
        run: |
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent "tauri/target/aarch64-apple-darwin/release/bundle/macos/Lingofix Desktop.app" "artifacts/Lingofix-Desktop-${{ github.ref_name }}-macos-arm64.zip"

      - name: Upload macOS ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64
          path: artifacts/Lingofix-Desktop-${{ github.ref_name }}-macos-arm64.zip

  macos-x64:
    name: Build macOS x64
    runs-on: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri -> target

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version ^2 --locked

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build macOS x64 app bundle
        run: npm run build:app:mac:x64

      - name: Archive app bundle
        run: |
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent "tauri/target/x86_64-apple-darwin/release/bundle/macos/Lingofix Desktop.app" "artifacts/Lingofix-Desktop-${{ github.ref_name }}-macos-x64.zip"

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-x64
          path: artifacts/Lingofix-Desktop-${{ github.ref_name }}-macos-x64.zip

  windows-x64:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri -> target

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version ^2 --locked

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build Windows x64 installer
        run: npm run build:app:win

      - name: Collect Windows installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $installer = Get-ChildItem "tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "No Windows installer found."
          }
          Copy-Item $installer.FullName "artifacts/Lingofix-Desktop-${{ github.ref_name }}-windows-x64.exe"

      - name: Upload Windows x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x64
          path: artifacts/Lingofix-Desktop-${{ github.ref_name }}-windows-x64.exe

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - macos-arm64
      - macos-x64
      - windows-x64

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/release-macos-arm64/Lingofix-Desktop-${{ github.ref_name }}-macos-arm64.zip
            artifacts/release-macos-x64/Lingofix-Desktop-${{ github.ref_name }}-macos-x64.zip
            artifacts/release-windows-x64/Lingofix-Desktop-${{ github.ref_name }}-windows-x64.exe
