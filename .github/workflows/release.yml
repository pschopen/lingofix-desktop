name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-version:
    name: Validate tag vs Cargo version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify release tag matches tauri/Cargo.toml version
        shell: bash
        run: |
          CARGO_VERSION=$(python - <<'PY'
          import re
          from pathlib import Path
          text = Path('tauri/Cargo.toml').read_text(encoding='utf-8')
          match = re.search(r'^version\s*=\s*"([^"]+)"\s*$', text, flags=re.MULTILINE)
          if not match:
              raise SystemExit('Could not find version in tauri/Cargo.toml')
          print(match.group(1))
          PY
          )
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          echo "Cargo version: ${CARGO_VERSION}"
          echo "Tag version:   ${TAG_VERSION}"

          if [ "${CARGO_VERSION}" != "${TAG_VERSION}" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match tauri/Cargo.toml version ${CARGO_VERSION}."
            exit 1
          fi

  macos-arm64:
    name: Build macOS ARM64
    runs-on: macos-14
    needs: validate-version

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri -> target

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version ^2 --locked

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build macOS ARM64 app bundle
        run: npm run build:app:mac:arm64

      - name: Re-sign and verify macOS ARM64 app
        run: |
          APP_PATH="tauri/target/aarch64-apple-darwin/release/bundle/macos/Lingofix Desktop.app"
          codesign --remove-signature "$APP_PATH" || true
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Archive app bundle
        run: |
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent "tauri/target/aarch64-apple-darwin/release/bundle/macos/Lingofix Desktop.app" "artifacts/Lingofix-Desktop-${{ github.ref_name }}-macos-arm64.zip"

      - name: Upload macOS ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64
          path: artifacts/Lingofix-Desktop-${{ github.ref_name }}-macos-arm64.zip

  macos-x64:
    name: Build macOS x64
    runs-on: macos-14
    needs: validate-version

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri -> target

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version ^2 --locked

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build macOS x64 app bundle
        run: npm run build:app:mac:x64

      - name: Re-sign and verify macOS x64 app
        run: |
          APP_PATH="tauri/target/x86_64-apple-darwin/release/bundle/macos/Lingofix Desktop.app"
          codesign --remove-signature "$APP_PATH" || true
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Archive app bundle
        run: |
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent "tauri/target/x86_64-apple-darwin/release/bundle/macos/Lingofix Desktop.app" "artifacts/Lingofix-Desktop-${{ github.ref_name }}-macos-x64.zip"

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-x64
          path: artifacts/Lingofix-Desktop-${{ github.ref_name }}-macos-x64.zip

  windows-x64:
    name: Build Windows x64
    runs-on: windows-latest
    needs: validate-version

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri -> target

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version ^2 --locked

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build Windows x64 installer
        run: npm run build:app:win

      - name: Collect Windows installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $installer = Get-ChildItem "tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "No Windows installer found."
          }
          Copy-Item $installer.FullName "artifacts/Lingofix-Desktop-${{ github.ref_name }}-windows-x64.exe"

      - name: Upload Windows x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x64
          path: artifacts/Lingofix-Desktop-${{ github.ref_name }}-windows-x64.exe

  linux-x64:
    name: Build Linux x64
    runs-on: ubuntu-22.04
    needs: validate-version

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            flatpak \
            flatpak-builder

      - name: Configure Flatpak runtime
        run: |
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri -> target

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version ^2 --locked

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build Linux x64 Flatpak inputs
        run: npm run build:app:linux:flatpak:prep

      - name: Build Linux x64 Flatpak bundle
        run: |
          flatpak-builder --user --force-clean --repo=flatpak-repo flatpak-build flatpak/com.lingofix.desktop.json
          mkdir -p artifacts
          flatpak build-bundle flatpak-repo "artifacts/Lingofix-Desktop-${{ github.ref_name }}-linux-x64.flatpak" com.lingofix.desktop

      - name: Upload Linux x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-x64
          path: artifacts/Lingofix-Desktop-${{ github.ref_name }}-linux-x64.flatpak

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - macos-arm64
      - macos-x64
      - windows-x64
      - linux-x64

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/release-macos-arm64/Lingofix-Desktop-${{ github.ref_name }}-macos-arm64.zip
            artifacts/release-macos-x64/Lingofix-Desktop-${{ github.ref_name }}-macos-x64.zip
            artifacts/release-windows-x64/Lingofix-Desktop-${{ github.ref_name }}-windows-x64.exe
            artifacts/release-linux-x64/Lingofix-Desktop-${{ github.ref_name }}-linux-x64.flatpak
