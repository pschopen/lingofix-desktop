name: Desktop Bundles

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  macos-arm64:
    name: macOS ARM64 App
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri -> target

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version ^2 --locked

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build macOS ARM64 app bundle
        run: npm run build:app:mac:arm64

      - name: Re-sign and verify macOS ARM64 app
        run: |
          APP_PATH="tauri/target/aarch64-apple-darwin/release/bundle/macos/Lingofix Desktop.app"
          codesign --remove-signature "$APP_PATH" || true
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Archive app bundle
        run: |
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent "tauri/target/aarch64-apple-darwin/release/bundle/macos/Lingofix Desktop.app" "artifacts/Lingofix-Desktop-macos-arm64.zip"

      - name: Upload macOS ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lingofix-Desktop-macos-arm64
          path: artifacts/Lingofix-Desktop-macos-arm64.zip

  macos-x64:
    name: macOS x64 App
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri -> target

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version ^2 --locked

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build macOS x64 app bundle
        run: npm run build:app:mac:x64

      - name: Re-sign and verify macOS x64 app
        run: |
          APP_PATH="tauri/target/x86_64-apple-darwin/release/bundle/macos/Lingofix Desktop.app"
          codesign --remove-signature "$APP_PATH" || true
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Archive app bundle
        run: |
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent "tauri/target/x86_64-apple-darwin/release/bundle/macos/Lingofix Desktop.app" "artifacts/Lingofix-Desktop-macos-x64.zip"

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lingofix-Desktop-macos-x64
          path: artifacts/Lingofix-Desktop-macos-x64.zip

  windows-x64:
    name: Windows x64 Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri -> target

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version ^2 --locked

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build Windows x64 installer
        run: npm run build:app:win

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lingofix-Desktop-windows-x64
          path: tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

  linux-x64:
    name: Linux x64 Flatpak Bundle
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            flatpak \
            flatpak-builder \
            xvfb

      - name: Configure Flatpak runtime
        run: |
          flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri -> target

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build Linux x64 Flatpak inputs
        run: npm run build:app:linux:flatpak:prep

      - name: Verify frontend dist assets
        run: |
          test -f frontend/dist/index.html
          if grep -q '/src/main.tsx' frontend/dist/index.html; then
            echo "frontend/dist/index.html still references dev entrypoint"
            exit 1
          fi
          if grep -q 'http://localhost' frontend/dist/index.html; then
            echo "frontend/dist/index.html still references localhost"
            exit 1
          fi

      - name: Build Linux x64 Flatpak bundle
        run: |
          flatpak-builder --user --force-clean --repo=flatpak-repo flatpak-build flatpak/com.lingofix.desktop.json
          mkdir -p artifacts
          flatpak build-bundle flatpak-repo artifacts/Lingofix-Desktop-linux-x64.flatpak com.lingofix.desktop

      - name: Smoke test Linux x64 Flatpak startup
        run: |
          flatpak install --user -y artifacts/Lingofix-Desktop-linux-x64.flatpak
          CONFIG_HOME="$(flatpak run --command=sh com.lingofix.desktop -c 'printf "%s" "$XDG_CONFIG_HOME"')"
          DEBUG_LOG_CANDIDATE_1="$CONFIG_HOME/com.lingofix.desktop/debug.log"
          DEBUG_LOG_CANDIDATE_2="$CONFIG_HOME/debug.log"
          rm -f "$DEBUG_LOG_CANDIDATE_1" "$DEBUG_LOG_CANDIDATE_2"

          set +e
          timeout 45s xvfb-run -a flatpak run com.lingofix.desktop > /tmp/lingofix-flatpak-smoke.log 2>&1
          RUN_EXIT=$?
          set -e

          if [ "$RUN_EXIT" -ne 0 ] && [ "$RUN_EXIT" -ne 124 ]; then
            cat /tmp/lingofix-flatpak-smoke.log
            echo "Flatpak smoke test failed before timeout"
            exit "$RUN_EXIT"
          fi

          DEBUG_LOG_PATH=""
          if [ -f "$DEBUG_LOG_CANDIDATE_1" ]; then
            DEBUG_LOG_PATH="$DEBUG_LOG_CANDIDATE_1"
          elif [ -f "$DEBUG_LOG_CANDIDATE_2" ]; then
            DEBUG_LOG_PATH="$DEBUG_LOG_CANDIDATE_2"
          else
            cat /tmp/lingofix-flatpak-smoke.log
            echo "UI smoke test failed: debug log not found"
            echo "Checked: $DEBUG_LOG_CANDIDATE_1"
            echo "Checked: $DEBUG_LOG_CANDIDATE_2"
            exit 1
          fi

          if ! grep -q '"event":"ui.setup"' "$DEBUG_LOG_PATH"; then
            cat /tmp/lingofix-flatpak-smoke.log
            cat "$DEBUG_LOG_PATH"
            echo "UI smoke test failed: ui.setup event missing"
            exit 1
          fi

          if ! grep -q '"event":"ui.page_loaded"' "$DEBUG_LOG_PATH"; then
            cat /tmp/lingofix-flatpak-smoke.log
            cat "$DEBUG_LOG_PATH"
            echo "UI smoke test failed: ui.page_loaded event missing"
            exit 1
          fi

      - name: Upload Linux Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lingofix-Desktop-linux-x64
          path: artifacts/Lingofix-Desktop-linux-x64.flatpak
